services:
  easy_proxies:
    build:
      context: .
      dockerfile: Dockerfile
      args:
        GOPROXY: https://goproxy.cn,direct
    image: easy_proxies:dev
    container_name: easy_proxies_dev
    restart: unless-stopped
    # macOS 不支持 network_mode: host，必须使用端口映射
    ports:
      - "2323:2323"       # Pool 入口
      - "9091:9091"       # WebUI
      - "24000-24100:24000-24100"  # Multi-port
    user: "${UID:-10001}:${GID:-10001}"
    volumes:
      - ./data:/etc/easy_proxies
      - ./logs:/app/logs
